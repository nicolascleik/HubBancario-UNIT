openapi: 3.0.3
info:
  title: Banking Hub API
  version: "1.0.0"
  description: API responsável pela integração com serviços bancários e processamento de recebimentos via Pix.

servers:
  - url: https://localhost:5001
    description: Ambiente local com HTTPS
  - url: http://localhost:5000
    description: Ambiente local com HTTP

paths:
  /health:
    get:
      summary: Verifica se a API está em funcionamento
      tags:
        - Health
      responses:
        "200":
          description: API disponível

components:
  schemas:
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true

tags:
  - name: Health
    description: Endpoints de monitoramento da aplicação