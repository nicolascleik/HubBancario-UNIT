services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bankinghub-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=bankinghub;Username=admin;Password=admin
      ConnectionStrings__HangfireConnection: Host=postgres;Port=5432;Database=bankinghub;Username=admin;Password=admin
      Itau__SandboxBaseUrl: http://mock-bank:8080
      Itau__ProductionBaseUrl: http://mock-bank:8080
      Itau__UseSandbox: "true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      - postgres
      - rabbitmq
      - mock-bank
    networks:
      - bankinghub-network

  mock-bank:
    image: wiremock/wiremock:latest
    container_name: mock-bank-itau
    ports:
      - "8080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command: --global-response-templating --verbose
    networks:
      - bankinghub-network

  postgres:
    image: postgres:16
    container_name: bankinghub-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bankinghub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bankinghub-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bankinghub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bankinghub-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: bankinghub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - bankinghub-network

volumes:
  postgres-data:

networks:
  bankinghub-network:
    driver: bridge
